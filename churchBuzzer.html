<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Text to Speech Model</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;margin:0;padding:40px}
.container{max-width:700px;margin:auto;background:white;padding:30px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
h1{margin-top:0}
textarea{width:100%;height:150px;padding:12px;border-radius:10px;border:1px solid #ccc;font-size:16px;resize:vertical}
.controls{margin-top:15px;display:flex;flex-direction:column;gap:12px}
button{padding:10px 18px;border:none;border-radius:10px;background:black;color:white;font-size:15px;cursor:pointer}
button:hover{opacity:0.85}
select, input{padding:8px;border-radius:8px;border:1px solid #ccc;width:100%}
.row{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>
  <a href="page2.html">Back to Main Page</a><br>
<div class="container">
<h1>Emmanuel AOG Buzzer</h1>
<p>Type the number to call.</p>

<textarea id="textInput" placeholder="Enter number here..."></textarea>

<div class="controls">
<div class="row">
<button onclick="speakText()">Speak</button>
<button onclick="stopSpeech()">Stop</button>
</div>

<div>
<label>Speed</label>
<input id="rate" type="range" min="0.5" max="2" step="0.1" value="1">
</div>

<div>
<label>Pitch</label>
<input id="pitch" type="range" min="0" max="2" step="0.1" value="1">
</div>

<div>
<label>Volume</label>
<input id="volume" type="range" min="0" max="1" step="0.1" value="1">
</div>

<div>
<label>Voice</label>
<select id="voiceSelect"></select>
</div>
</div>
</div>

<script>
const synth = window.speechSynthesis
const voiceSelect = document.getElementById('voiceSelect')

function loadVoices(){
const voices = synth.getVoices()
voiceSelect.innerHTML=''
voices.forEach((voice,i)=>{
const option=document.createElement('option')
option.value=i
option.text=voice.name + ' (' + voice.lang + ')'
voiceSelect.appendChild(option)
})
}

loadVoices()
if (speechSynthesis.onvoiceschanged !== undefined){
speechSynthesis.onvoiceschanged = loadVoices
}

function speakText(){
const text=document.getElementById('textInput').value
if(!text) return

const utterance=new SpeechSynthesisUtterance(text)
const voices=synth.getVoices()
utterance.voice=voices[voiceSelect.value]
utterance.rate=document.getElementById('rate').value
utterance.pitch=document.getElementById('pitch').value
utterance.volume=document.getElementById('volume').value

synth.cancel()
synth.speak(utterance)
}

function stopSpeech(){
synth.cancel()
}
</script>
</body>
</html>
